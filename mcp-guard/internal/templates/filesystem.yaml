# mcp-guard.yaml — Filesystem MCP Server Template
# Generated by: mcp-guard init --template filesystem
# Demonstrates path-based parameter blocking.
version: "1"

proxy:
  mode: stdio
  listen: ":8443"
  upstream: ""

policies:
  # Allow reads from safe project directories
  - name: allow-project-reads
    action: allow
    match:
      identity: "*"
      tools: ["read_*", "search_*", "list_*", "get_*"]
      params:
        path: ["/home/*/projects/**", "/tmp/**", "/app/**"]

  # Block access to system files
  - name: block-system-paths
    action: block
    alert: true
    match:
      identity: "*"
      tools: ["read_*", "search_*", "list_*", "get_*", "write_*"]
      params:
        path: ["/etc/**", "/var/**", "/proc/**", "/sys/**", "/root/**"]

  # Block all write/delete/exec operations
  - name: block-writes-exec
    action: block
    alert: true
    match:
      identity: "*"
      tools: ["write_*", "delete_*", "move_*", "chmod_*", "exec_*"]

ratelimit:
  default: 10/min

alert:
  webhook_url: "${SLACK_WEBHOOK_URL}"
  channel: slack
  on_block: true

audit:
  path: /var/log/mcp-guard/audit.jsonl
  hmac_key: "${MCP_GUARD_HMAC_KEY}"
  rotation: 100MB

schema_pinning:
  enabled: true
  mode: block
  store: ".mcp-guard/pins.json"
