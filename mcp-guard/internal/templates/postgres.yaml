# mcp-guard.yaml — PostgreSQL MCP Server Template
# Generated by: mcp-guard init --template postgres
# Blocks destructive SQL at the parameter level while allowing SELECT queries.
version: "1"

proxy:
  mode: tcp
  listen: ":8443"
  upstream: "localhost:5432"

policies:
  # Allow read-only queries
  - name: allow-select-queries
    action: allow
    match:
      identity: "*"
      tools: ["query", "run_sql", "execute"]
      params:
        sql: ["SELECT *", "EXPLAIN *", "SHOW *", "DESCRIBE *", "BEGIN *", "COMMIT"]

  # Block destructive SQL by parameter content
  - name: block-destructive-sql
    action: block
    alert: true
    match:
      identity: "*"
      tools: ["query", "run_sql", "execute"]
      params:
        sql: ["DROP *", "TRUNCATE *", "ALTER *", "DELETE *", "UPDATE *", "INSERT *", "CREATE *", "GRANT *"]

ratelimit:
  default: 30/min

alert:
  webhook_url: "${SLACK_WEBHOOK_URL}"
  channel: slack
  on_block: true
  on_rate_limit: true

audit:
  path: /var/log/mcp-guard/audit.jsonl
  hmac_key: "${MCP_GUARD_HMAC_KEY}"
  rotation: 100MB

schema_pinning:
  enabled: true
  mode: block
  store: ".mcp-guard/pins.json"
