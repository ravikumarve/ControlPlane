# mcp-guard.yaml — GitHub MCP Server Template
# Generated by: mcp-guard init --template github
version: "1"

proxy:
  mode: tcp
  listen: ":8443"
  upstream: "localhost:3000"

policies:
  # Safe read/search operations — allow freely
  - name: allow-safe-reads
    action: allow
    match:
      identity: "*"
      tools: ["search_*", "get_*", "list_*", "read_*"]

  # Destructive writes blocked on protected branches
  - name: block-protected-branches
    action: block
    alert: true
    match:
      identity: "*"
      tools: ["delete_*", "update_*"]
      params:
        branch: ["main", "production", "master"]

  # Allow writes on feature branches
  - name: allow-feature-branch-writes
    action: allow
    match:
      identity: "*"
      tools: ["delete_*", "update_*"]
      params:
        branch: ["feature-*", "dev-*", "fix-*"]

ratelimit:
  default: 60/min

alert:
  webhook_url: "${SLACK_WEBHOOK_URL}"
  channel: slack
  on_block: true
  on_rate_limit: true

audit:
  path: /var/log/mcp-guard/audit.jsonl
  hmac_key: "${MCP_GUARD_HMAC_KEY}"
  rotation: 100MB

schema_pinning:
  enabled: true
  mode: warn
  store: ".mcp-guard/pins.json"
